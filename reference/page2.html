<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IoT Project Builder - Page 2</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#2b2b2b;
  color:#fff;
}
.app{
  display:flex;
  height:100vh;
}

/* Sidebar */
.sidebar{
  width:300px;
  background:#111;
  padding:15px;
  overflow-y:auto;
}
.sidebar h2{
  text-align:center;
}
.project{
  background:#1f1f1f;
  padding:10px;
  margin-bottom:8px;
  border-radius:6px;
  cursor:pointer;
}
.project:hover{background:#333;}
.project.active{
  background:#4CAF50;
}

/* Main */
.main{
  flex:1;
  padding:20px;
  overflow-y:auto;
}
.header{
  background:#fff;
  color:#000;
  padding:12px;
  border-radius:10px;
  font-size:22px;
  font-weight:bold;
  text-align:center;
}

/* Components */
.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
}
.comp{
  background:#fff;
  color:#000;
  border-radius:12px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}
.comp img{
  width:80px;
  height:80px;
  margin-top:5px;
}
.comp.selected{
  background:#4CAF50;
  color:#fff;
}

.next{
  margin:30px auto;
  display:block;
  padding:14px 40px;
  font-size:18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Projects</h2>
    <div id="projectList"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="header">Select Components</div>
    <div class="grid" id="componentGrid"></div>
    <button class="next" onclick="goNext()">Next</button>
  </div>

</div>

<script>
/* ================= COMPONENT LIST ================= */

const components = [
 "LED","RGB LED","Relay Module","Buzzer","Push Button","Potentiometer",
 "LDR","IR Sensor","PIR Motion Sensor","Ultrasonic Sensor",
 "DHT11","DHT22","MQ Gas Sensor","Soil Moisture Sensor","Rain Sensor",
 "Sound Sensor","OLED Display","LCD 16x2","Servo Motor","DC Motor",
 "Stepper Motor","Motor Driver (L298N)","WiFi (Built-in)","Bluetooth",
 "GPS Module","GSM Module","RTC Module","SD Card Module","Keypad",
 "Touch Sensor","Current Sensor","Voltage Sensor","Fan",
 "Water Pump","Solenoid Lock"
];

/* ================= PROJECT MAP (40 PROJECTS) ================= */

const projectMap = {
 "Smart LED Control System":["LED"],
 "RGB LED Color Controller":["RGB LED","Potentiometer"],
 "WiFi Based Home Automation":["Relay Module","LED","Fan","WiFi (Built-in)"],
 "Smart Relay Control":["Relay Module","LED"],
 "Motion Based Light System":["PIR Motion Sensor","Relay Module","LED"],
 "Smart Temperature & Humidity Monitor":["DHT11","OLED Display"],
 "Weather Monitoring System":["DHT22","Rain Sensor","OLED Display"],
 "Smart Fan Controller":["Fan","Relay Module"],
 "Gas Leakage Detection System":["MQ Gas Sensor","Buzzer","LED"],
 "Fire Alarm System":["MQ Gas Sensor","Buzzer","LED"],
 "Smart Security System":["PIR Motion Sensor","Buzzer","Relay Module"],
 "PIR Motion Detection Alarm":["PIR Motion Sensor","Buzzer"],
 "Ultrasonic Distance Measurement":["Ultrasonic Sensor","OLED Display"],
 "Smart Parking System":["Ultrasonic Sensor","LED","Buzzer"],
 "Automatic Water Pump Controller":["Soil Moisture Sensor","Relay Module","Water Pump"],
 "Smart Irrigation System":["Soil Moisture Sensor","Relay Module","Water Pump"],
 "Soil Moisture Monitoring System":["Soil Moisture Sensor","OLED Display"],
 "Rain Detection & Alert System":["Rain Sensor","Buzzer"],
 "Sound Level Monitoring System":["Sound Sensor","OLED Display"],
 "Smart Door Lock System":["Keypad","Solenoid Lock","Relay Module","Buzzer"],
 "OLED Based Sensor Dashboard":["OLED Display","DHT11","LDR"],
 "LCD Based Monitoring System":["LCD 16x2","DHT11"],
 "Energy Monitoring System":["Voltage Sensor","Current Sensor","LCD 16x2"],
 "Voltage & Current Monitoring System":["Voltage Sensor","Current Sensor"],
 "Smart Motor Speed Controller":["DC Motor","Motor Driver (L298N)"],
 "Servo Motor Angle Controller":["Servo Motor","Potentiometer"],
 "Stepper Motor Control System":["Stepper Motor","Motor Driver (L298N)"],
 "Bluetooth Based Device Control":["Bluetooth","Relay Module","LED"],
 "GSM Based Alert System":["GSM Module","Buzzer"],
 "GPS Tracking System":["GPS Module","GSM Module"],
 "Smart Attendance System":["RTC Module","Keypad","LCD 16x2"],
 "SD Card Data Logger":["SD Card Module","RTC Module"],
 "RTC Based Digital Clock":["RTC Module","LCD 16x2"],
 "Touch Sensor Control System":["Touch Sensor","Relay Module"],
 "Keypad Based Security System":["Keypad","Relay Module","Buzzer"],
 "Smart Fan & Light Automation":["Fan","LED","Relay Module"],
 "Air Quality Monitoring System":["MQ Gas Sensor","OLED Display"],
 "Smart Water Level Monitoring System":["Ultrasonic Sensor","Relay Module","Water Pump"],
 "Smart Home Safety System":["PIR Motion Sensor","MQ Gas Sensor","Buzzer"],
 "IoT Based Smart Farming System":["Soil Moisture Sensor","Rain Sensor","DHT22","Relay Module"]
};

/* ================= RENDER PROJECTS ================= */

const projectList=document.getElementById("projectList");
Object.keys(projectMap).forEach(project=>{
  const div=document.createElement("div");
  div.className="project";
  div.innerText=project;
  div.onclick=()=>selectProject(div,project);
  projectList.appendChild(div);
});

/* ================= RENDER COMPONENTS ================= */

const grid=document.getElementById("componentGrid");
components.forEach(c=>{
  const div=document.createElement("div");
  div.className="comp";
  div.dataset.name=c;
  div.innerHTML=`
    <div>${c}</div>
    <img src="https://via.placeholder.com/80?text=${encodeURIComponent(c)}">
  `;
  div.onclick=()=>div.classList.toggle("selected");
  grid.appendChild(div);
});

/* ================= SELECT PROJECT ================= */

function selectProject(el,project){
  document.querySelectorAll(".project")
    .forEach(p=>p.classList.remove("active"));
  el.classList.add("active");

  // SAVE PROJECT FOR PAGE-3 & PAGE-4
  localStorage.setItem("selectedProject",project);

  // Auto select components
  const list=projectMap[project]||[];
  document.querySelectorAll(".comp").forEach(c=>{
    c.classList.remove("selected");
    if(list.includes(c.dataset.name)){
      c.classList.add("selected");
    }
  });
}

/* ================= NEXT ================= */

function goNext(){
  const project=localStorage.getItem("selectedProject");
  if(!project){
    alert("Please select a project first");
    return;
  }

  const selected=[...document.querySelectorAll(".comp.selected")]
    .map(c=>c.dataset.name);

  if(selected.length===0){
    alert("Select at least one component");
    return;
  }

  localStorage.setItem("components",JSON.stringify(selected));
  window.location.href="page3.html";
}
</script>

</body>
</html>
