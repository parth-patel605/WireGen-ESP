<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Board</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(#254ad2,#e6e6e6);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      width:360px;
    }

    .header{
      background:#e53a34;
      padding:12px;
      text-align:center;
      font-size:20px;
      font-weight:bold;
      border-radius:8px;
      margin-bottom:15px;
    }

    .card{
      background:#fff;
      padding:30px 20px;
      border-radius:10px;
      text-align:center;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    .board-btn{
      width:100%;
      padding:16px;
      margin:15px 0;
      font-size:18px;
      background:#b3b3b3;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .board-btn.selected{
      background:#4CAF50;
      color:white;
    }

    .next-btn{
      margin-top:20px;
      padding:14px;
      width:60%;
      font-size:16px;
      background:#9e9e9e;
      border:none;
      border-radius:30px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="header">Select board</div>

  <div class="card">
    <button class="board-btn" onclick="selectBoard('ESP8266',this)">ESP8266</button>
    <button class="board-btn" onclick="selectBoard('ESP32',this)">ESP32</button>

    <button class="next-btn" onclick="nextPage()">Next</button>
  </div>
</div>

<script>
  let selectedBoard = "";

  function selectBoard(board,btn){
    selectedBoard = board;
    localStorage.setItem("selectedBoard", board);

    document.querySelectorAll(".board-btn")
      .forEach(b => b.classList.remove("selected"));

    btn.classList.add("selected");
  }

  function nextPage(){
    if(selectedBoard === ""){
      alert("Please select a board");
      return;
    }
    // Page-2 file open thase
    window.location.href = "page2.html";
  }
</script>

</body>
</html>
